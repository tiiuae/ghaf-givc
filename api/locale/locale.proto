// Locale Service API
syntax = "proto3";
option go_package = "givc/modules/api/locale";
package locale;

message LocaleMessage {
    string Locale = 1;      // Locale string
}

message TimezoneMessage {
    string Timezone = 1;    // Timezone
}

// Empty message
message Empty {
}

service LocaleClient {
    rpc LocaleSet(LocaleMessage) returns (Empty) {}     // Set locale for a VM
    rpc TimezoneSet(TimezoneMessage) returns (Empty) {} // Set timezone for a VM
}
