// Socket Proxy Service API
syntax = "proto3";
option go_package = "givc/modules/api/socketproxy";
package socketproxy;

// Stream frame with raw bytes and explicit EOF signalling.
// `chunk` is always the payload bytes for this frame.
// EOF is represented by `eof = true` (typically with empty `chunk`).
message StreamFrame {

    // Raw payload bytes.
    bytes Chunk = 1;

    // true when this frame marks end of stream.
    bool Eof = 2;

}

service SocketStream {
    // Bi-directional framed socket stream with explicit EOF signalling.
    rpc TransferData(stream StreamFrame) returns (stream StreamFrame) {}
}

