syntax = "proto3";
option go_package = "givc/modules/api/eventproxy";
package eventproxy;

message InputEvent {
  int64 timestamp = 1; // nanoseconds
  uint32 type = 2;
  uint32 code = 3;
  int32 value = 4;
}

message Ack {
  string status = 1;
}

service EventService {
  rpc StreamEvents (stream InputEvent) returns (Ack) {}
}